x-asterisk-base: &asterisk-base
  # 20-current removed upstream; use 20-cert (Asterisk 20 LTS certified)
  image: ${ASTERISK_IMAGE:-andrius/asterisk:20-cert}
  restart: unless-stopped
  cap_add: [NET_ADMIN, NET_BROADCAST, SYS_NICE]
  environment:
    PG_HOST: ${PG_HOST}
    PG_PORT: ${PG_PORT}
    PG_DB: ${PG_DB}
    PG_USER: ${PG_USER}
    PG_PASSWORD: ${PG_PASSWORD}
    PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-172.16.6.183}
    GSM_MEDIA_ADDRESS: ${GSM_MEDIA_ADDRESS:-172.16.6.183}
    GSM_SIGNAL_ADDRESS: ${GSM_SIGNAL_ADDRESS:-172.16.4.19}
    SIP_PROVIDER_SIGNAL_NET: ${SIP_PROVIDER_SIGNAL_NET:-10.1.5.8/29}
    SIP_PROVIDER_MEDIA_NET: ${SIP_PROVIDER_MEDIA_NET:-10.1.5.64/27}
    GSM_ROUTE_SIGNAL_NET: ${GSM_ROUTE_SIGNAL_NET:-10.1.5.8/29}
    GSM_ROUTE_MEDIA_NET: ${GSM_ROUTE_MEDIA_NET:-10.1.5.64/27}
    GSM_ROUTE_SIGNAL_VIA: ${GSM_ROUTE_SIGNAL_VIA:-172.16.4.1}
    GSM_ROUTE_SIGNAL_DEV: ${GSM_ROUTE_SIGNAL_DEV:-enp13s4f0}
    GSM_ROUTE_MEDIA_VIA: ${GSM_ROUTE_MEDIA_VIA:-172.16.6.131}
    GSM_ROUTE_MEDIA_DEV: ${GSM_ROUTE_MEDIA_DEV:-enp6s0f0}
    CC_MEDIA_DEBUG: ${CC_MEDIA_DEBUG:-1}
    CC_RTP_DEBUG: ${CC_RTP_DEBUG:-0}
    AGENT_WEBRTC_MODE: ${AGENT_WEBRTC_MODE:-manual}
    CC_SUBSCRIBERS_ACCESS_JSON: /opt/cc/webui-data/subscribers_access.json
    CC_GROUPS_JSON: /opt/cc/webui-data/groups.json
  volumes:
    - ./asterisk/etc:/etc/asterisk
    - ./asterisk/static-http:/var/lib/asterisk/static-http:ro
    - ./asterisk/scripts:/opt/cc/scripts:ro
    - ./webui/data:/opt/cc/webui-data:ro
    - asterisk-spool:/var/spool/asterisk
    - asterisk-logs:/var/log/asterisk
    - ./recordings:/var/spool/asterisk/recordings
  depends_on: [postgres]

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DB}
      POSTGRES_USER: ${PG_SUPER_USER}
      POSTGRES_PASSWORD: ${PG_SUPER_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/sql:/docker-entrypoint-initdb.d:ro
    ports: ["${PG_PUBLISH_PORT:-5433}:5432"]

  coturn:
    image: coturn/coturn:4.6.2
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./ops/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    command: ["-c", "/etc/coturn/turnserver.conf"]

  asterisk-a:
    <<: *asterisk-base
    hostname: asterisk-a
    network_mode: host
    entrypoint: ["/bin/bash", "/opt/cc/scripts/docker-entrypoint.sh"]

  asterisk-b:
    <<: *asterisk-base
    hostname: asterisk-b
    profiles: [ha]
    network_mode: host
    entrypoint: ["/bin/bash", "/opt/cc/scripts/docker-entrypoint.sh"]

  kamailio:
    image: ghcr.io/kamailio/kamailio-ci:5.7-alpine
    restart: unless-stopped
    profiles: [sbc]
    network_mode: host
    volumes:
      - ./kamailio/kamailio.cfg:/etc/kamailio/kamailio.cfg:ro

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prom-data:/prometheus
    ports: ["${PROMETHEUS_PUBLISH_PORT:-9091}:9090"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${PG_SUPER_USER:-postgres}:${PG_SUPER_PASSWORD:-changeme}@postgres:5432/${PG_DB:-asterisk_cc}?sslmode=disable"
    depends_on: [postgres]

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    network_mode: host
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|run|var/lib/docker)($$|/)

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://172.16.6.183:3001/}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/ops_dashboard.json
      GF_DATE_FORMATS_DEFAULT_TIMEZONE: Asia/Dushanbe
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports: ["${GRAFANA_PUBLISH_PORT:-3001}:3000"]
    depends_on: [prometheus, postgres-exporter, postgres]

  # Metrics now run inside asterisk-a via start_asterisk_exporter.sh (:9815)
  asterisk-exporter:
    profiles: [legacy]
    image: ghcr.io/raoulh/asterisk_exporter:latest
    restart: unless-stopped
    network_mode: host
    environment:
      ASTERISK_HOST: 127.0.0.1
      ASTERISK_AMI_USER: exporter
      ASTERISK_AMI_PASSWORD: ${ASTERISK_AMI_PASSWORD}
    depends_on: [asterisk-a]

  fail2ban:
    image: crazymax/fail2ban:latest
    restart: unless-stopped
    network_mode: host
    cap_add: [NET_ADMIN, NET_RAW]
    volumes:
      - asterisk-logs:/var/log/asterisk:ro
      - ./monitoring/fail2ban:/data:ro

  webui:
    image: python:3.10-slim
    restart: unless-stopped
    working_dir: /app
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: ${PG_DB:-asterisk_cc}
      PG_SUPER_USER: ${PG_SUPER_USER:-postgres}
      PG_SUPER_PASSWORD: ${PG_SUPER_PASSWORD:-changeme}
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-172.16.6.183}
      AGENT_WEBRTC_MODE: ${AGENT_WEBRTC_MODE:-manual}
      SIP_PROVIDER_SIGNAL_NET: ${SIP_PROVIDER_SIGNAL_NET:-10.1.5.8/29}
      SIP_PROVIDER_MEDIA_NET: ${SIP_PROVIDER_MEDIA_NET:-10.1.5.64/27}
      ASTERISK_AMI_HOST: ${ASTERISK_AMI_HOST:-host.docker.internal}
      ASTERISK_AMI_PORT: "5038"
      ASTERISK_AMI_USER: ${ASTERISK_AMI_USER:-cti}
      ASTERISK_AMI_PASSWORD: ${ASTERISK_AMI_PASSWORD:-changeme}
      CC_DATA_DIR: /app/data
      CC_ASTERISK_ETC: /asterisk-etc
      WEBUI_TLS_PORT: ${WEBUI_TLS_PORT:-9443}
      CC_TLS_CERT: /tls/asterisk.pem
      CC_TLS_KEY: /tls/asterisk.key
    volumes:
      - ./webui:/app
      - ./asterisk/etc:/asterisk-etc:rw
      - ./asterisk/etc/keys:/tls:ro
    command: ["sh", "-c", "pip install -q -r requirements.txt && python serve.py 9000"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: [postgres]
    ports:
      - "${WEBUI_PUBLISH_PORT:-9000}:9000"
      - "${WEBUI_TLS_PORT:-9443}:9443"

volumes:
  pgdata:
  asterisk-spool:
  asterisk-logs:
  recordings:
  prom-data:
  grafana-data:
