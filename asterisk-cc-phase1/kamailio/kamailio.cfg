#!KAMAILIO
# Minimal SBC in front of Asterisk active/standby VIP.
# Goals: TLS termination, anti-fraud rate limit, dispatching to Asterisk VIP.

#!define WITH_TLS
#!define WITH_PIKE
#!define WITH_DISPATCHER

####### Defaults
listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060
#!ifdef WITH_TLS
listen=tls:0.0.0.0:5061
#!endif

mpath="/usr/lib64/kamailio/modules"
loadmodule "tm.so"
loadmodule "rr.so"
loadmodule "sl.so"
loadmodule "siputils.so"
loadmodule "textops.so"
loadmodule "maxfwd.so"
loadmodule "dispatcher.so"
loadmodule "pike.so"
loadmodule "ipops.so"

modparam("dispatcher", "list_file", "/etc/kamailio/dispatcher.list")
modparam("dispatcher", "flags", 2)
modparam("dispatcher", "ds_ping_interval", 30)
modparam("pike", "sampling_time_unit", 2)
modparam("pike", "reqs_density_per_unit", 30)
modparam("pike", "remove_latency", 4)

####### Routing
request_route {
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483","Too Many Hops");
        exit;
    }
    if (!sanity_check()) { exit; }

    # Anti-flood
    if (is_method("INVITE|REGISTER")) {
        if (!pike_check_req()) {
            xlog("L_WARN", "Pike: blocked $si\n");
            sl_send_reply("503","Service Unavailable");
            exit;
        }
    }

    if (loose_route()) {
        route(RELAY);
        exit;
    }

    if (is_method("OPTIONS")) {
        sl_send_reply("200","OK");
        exit;
    }

    # Reject ACK that doesn't match a transaction
    if (is_method("ACK")) {
        if (t_check_trans()) { route(RELAY); }
        exit;
    }

    record_route();

    # Dispatch INVITE to Asterisk VIP set
    if (is_method("INVITE")) {
        ds_select_dst("1","8");
        route(RELAY);
        exit;
    }

    sl_send_reply("405","Method Not Allowed");
}

route[RELAY] {
    if (!t_relay()) { sl_reply_error(); }
    exit;
}
