; Trusted GSM/SBC (SoftX + UMG) — identify по ПОДСЕТЯМ (не /32):

;   сигналинг ${SIP_PROVIDER_SIGNAL_NET}  (хост SoftX: ${SIP_PROVIDER_SIGNAL}, напр. 10.1.5.10)

;   медиа     ${SIP_PROVIDER_MEDIA_NET}   (хост UMG:    ${SIP_PROVIDER_MEDIA}, напр. 10.1.5.75)

; Пары IP: SoftX↔172.16.4.19, UMG RTP↔172.16.6.183 — см. ops/gsm-ip-reference.md



[provider]

type=endpoint

context=from-provider

disallow=all

allow=alaw,ulaw

direct_media=no

media_address=172.16.6.183

bind_rtp_to_media_address=yes

rtp_symmetric=yes

rtp_keepalive=15

force_rport=yes

rewrite_contact=yes

identify_by=ip

ice_support=no

media_use_received_transport=yes



[provider-identify]

type=identify

endpoint=provider

match=${SIP_PROVIDER_SIGNAL_NET}

match=${SIP_PROVIDER_MEDIA_NET}

