[general]
rtpstart=10000
rtpend=20000
icesupport=yes
; WebRTC-агенты: external → 172.16.6.183 (PUBLIC_DOMAIN)
; GSM provider: media в SDP/RTP через pjsip_provider media_address=10.212.154.35 (enp13s4f1)
external_media_address=172.16.6.183
external_signaling_address=172.16.6.183
; НЕ localnet=10.0.0.0/8 и НЕ 10.1.5.x — GSM вне localnet, provider media_address=10.212.154.35
localnet=172.16.0.0/12
localnet=127.0.0.0/8
; НЕ 192.168.0.0/16 — иначе Chrome-агентам уходит внутренний IP сервера в ICE
strictrtp=no
; rtp_keepalive на endpoint (сек) должен быть меньше rtcpinterval/1000
rtcpinterval=5000

; ICE-маппинги интерфейсов → PUBLIC_DOMAIN (см. rtp_ice_extra.conf, генерируется при старте)
#include "rtp_ice_extra.conf"
