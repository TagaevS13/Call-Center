; Переопределения CC (include в конце extensions.conf)

; -------------------------------------------------------------------------
; CC-TRACE: структурированный трейс звонка (grep CC-TRACE в cc_calls.log / full)
; Gosub(cc-trace,s,1(PHASE,context,ext))
; -------------------------------------------------------------------------
[cc-trace]
exten => s,1,NoOp(CC-TRACE|phase=${ARG1}|ctx=${ARG2}|ext=${ARG3}|caller=${CALLERID(num)}|name=${CALLERID(name)}|did=${INBOUND_DID}|unique=${UNIQUEID}|linked=${LINKEDID}|chan=${CHANNEL}|peer=${CHANNEL(peername)}|pjsip_ep=${CHANNEL(endpoint)}|remote=${CHANNEL(pjsip,remote_addr)}|local=${CHANNEL(pjsip,local_addr)}|rtp_src=${CHANNEL(rtp,src)}|queue=${QUEUE_NAME}|qstatus=${QUEUESTATUS}|member=${MEMBERINTERFACE}|hangup=${HANGUPCAUSE})
 same => n,Return()

[queue-enter]
exten => h,1,Gosub(cc-trace,s,1(HANGUP,queue-enter,h))
 same => n,Gosub(cc-trace,s,1(QUEUE_DONE,queue-enter,${QUEUE_NAME}))
 same => n,NoOp(CC hangup — запись уже идёт через MixMonitor в queue-enter)
 same => n,Hangup()
