[general]
persistentmembers=yes
autofill=yes
monitor-type=MixMonitor
shared_lastcall=yes
log_membername_as_agent=yes

[queue-defaults](!)
musicclass=default
strategy=leastrecent
; yes — абонент ждёт в очереди, даже если агент Offline (иначе сброс при joinempty=no)
joinempty=yes
leavewhenempty=no
ringinuse=no
timeout=20
retry=2
wrapuptime=10
maxlen=0
servicelevel=20
announce-frequency=30
periodic-announce-frequency=60
announce-position=yes
announce-holdtime=once
setinterfacevar=yes
setqueueentryvar=yes
setqueuevar=yes
context=after-queue

; Очереди генерируются из Postgres (таблица queues) — cc_config_sync.py
#include "queues_generated.conf"
#include "queues_members.conf"
