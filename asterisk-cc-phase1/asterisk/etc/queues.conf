[general]
persistentmembers=yes
autofill=yes
monitor-type=MixMonitor
shared_lastcall=yes
log_membername_as_agent=yes

[queue-defaults](!)
musicclass=default
strategy=leastrecent
joinempty=no
leavewhenempty=yes
ringinuse=no
timeout=20
retry=2
wrapuptime=10
maxlen=0
servicelevel=20
announce-frequency=30
periodic-announce-frequency=60
announce-position=yes
announce-holdtime=once
setinterfacevar=yes
setqueueentryvar=yes
setqueuevar=yes
context=after-queue

[support](queue-defaults)
strategy=leastrecent
servicelevel=20

[sales](queue-defaults)
strategy=ringall
servicelevel=15

[billing](queue-defaults)
strategy=fewestcalls
servicelevel=30

[vip](queue-defaults)
strategy=ringall
servicelevel=10
weight=100

[overflow](queue-defaults)
strategy=leastrecent
servicelevel=60
