[globals]
RECORDINGS_DIR=/var/spool/asterisk/recordings
POST_REC_SCRIPT=/opt/cc/scripts/mixmonitor_post.sh

[general]
static=yes
writeprotect=no
clearglobalvars=no

; =====================================================================
; Inbound from provider -> IVR
; =====================================================================
[from-provider]
exten => _X.,1,Gosub(cc-trace,s,1(INBOUND_START,from-provider,${EXTEN}))
 same => n,NoOp(Inbound from ${CALLERID(num)} to ${EXTEN})
 same => n,Set(__BUSINESS_CALL=1)
 same => n,Set(__INBOUND_DID=${EXTEN})
 same => n,Set(CDR(userfield)=did=${EXTEN}\;src=${CALLERID(num)})
 same => n,Goto(vdn-route,${EXTEN},1)

; =====================================================================
; Main IVR (with AGI lookup to Postgres)
; =====================================================================
[ivr-main]
exten => s,1,Gosub(cc-trace,s,1(IVR_START,ivr-main,s))
 same => n,NoOp(IVR main)
 same => n,Answer()
 same => n,Wait(0.3)
 same => n,Set(IVR_RETRIES=0)
 same => n,AGI(/opt/cc/scripts/lookup_subscriber.agi,${CALLERID(num)})
 same => n,Set(CDR(userfield)=${CDR(userfield)};segment=${SUB_SEGMENT};lang=${SUB_LANG})
 ; ЧС (scope=all): абонент не дозванивается
 same => n,GotoIf($["${SUB_BLOCKED}"="1"]?blacklisted,1)
 ; VIP (scope=all): сразу в VIP-очередь, без ожидания в IVR/общей очереди
 same => n,GotoIf($["${SUB_VIP}"="1"]?queue-enter,${SUB_VIP_QUEUE},1)
 same => n(menu),Read(IVR_DIGIT,custom/101,1,,,15)
 same => n,GotoIf($["${IVR_DIGIT}"="1"]?queue-enter,russkaya,1)
 same => n,GotoIf($["${IVR_DIGIT}"="2"]?queue-enter,tajikskaya,1)
 same => n,GotoIf($["${IVR_DIGIT}"="3"]?queue-enter,angliyskaya,1)
 same => n,GotoIf($["${IVR_DIGIT}"="9"]?queue-enter,vip,1)
 same => n,Goto(timeout,1)

; Клавиши IVR по умолчанию (если звонок попал в ivr-main без VDN)
exten => 1,1,Goto(queue-enter,russkaya,1)
exten => 2,1,Goto(queue-enter,tajikskaya,1)
exten => 3,1,Goto(queue-enter,angliyskaya,1)
exten => 9,1,Goto(queue-enter,vip,1)

exten => i,1,Playback(invalid)
 same => n,Set(IVR_RETRIES=$[${IVR_RETRIES}+1])
 same => n,GotoIf($[${IVR_RETRIES} > 2]?ivr-main,timeout,1:ivr-main,s,menu)

exten => t,1,Goto(timeout,1)

exten => timeout,1,Hangup()

exten => blacklisted,1,NoOp(Subscriber blacklisted: ${CALLERID(num)} ${SUB_BLOCK_REASON})
 same => n,Playback(ss-noservice)
 same => n,Hangup()

; =====================================================================
; Queue enter macro: turn on MixMonitor + bind metadata
; =====================================================================
[queue-enter]
exten => _.,1,Gosub(cc-trace,s,1(QUEUE_ENTER,queue-enter,${EXTEN}))
 same => n,NoOp(Enter queue ${EXTEN})
 same => n,Verbose(1,CC-MEDIA queue-enter queue=${EXTEN} caller=${CALLERID(num)} chan=${CHANNEL})
 same => n,Set(QUEUE_NAME=${EXTEN})
 ; ЧС по выбранным направлениям / VIP по очереди
 same => n,AGI(/opt/cc/scripts/check_subscriber_queue.agi,${CALLERID(num)},${QUEUE_NAME})
 same => n,GotoIf($["${SUB_BLOCKED}"="1"]?q-blocked,1)
 same => n,Set(__CALL_QUEUE=${QUEUE_NAME})
 same => n,Set(__CALL_REC=${UNIQUEID}_${QUEUE_NAME}_${CALLERID(num)})
 same => n,Set(__CALL_REC_DIR=${RECORDINGS_DIR}/${STRFTIME(${EPOCH},,%Y/%m/%d)})
 same => n,System(/bin/mkdir -p ${CALL_REC_DIR})
 same => n,MixMonitor(${CALL_REC_DIR}/${CALL_REC}.wav,b(${POST_REC_SCRIPT}^${UNIQUEID}^${LINKEDID}^${QUEUE_NAME}^${CALL_REC_DIR}/${CALL_REC}.wav^${CALLERID(num)}^${EXTEN}))
 ; VIP: позиция 1 в очереди (без ожидания за обычными абонентами)
 same => n,GotoIf($["${SUB_VIP}"="1"]?q-vip,1)
 same => n,Set(PJSIP_HEADER(add,X-Queue)=${QUEUE_NAME})
 same => n,Set(PJSIP_HEADER(add,X-Group)=${QUEUE_NAME})
 same => n,Queue(${QUEUE_NAME},tT,,,300)
 same => n,Goto(queue-finished,1)
 same => n(q-vip),Set(PJSIP_HEADER(add,X-Queue)=${QUEUE_NAME})
 same => n,Set(PJSIP_HEADER(add,X-Group)=${QUEUE_NAME})
 same => n,Queue(${QUEUE_NAME},tT,,,300,,,,,1)
 same => n,Goto(queue-finished,1)

exten => queue-finished,1,Gosub(cc-trace,s,1(QUEUE_DONE,queue-enter,${EXTEN}))
 same => n,NoOp(Queue done ${QUEUESTATUS} queue=${QUEUE_NAME})
 same => n,GotoIf($["${QUEUESTATUS}"="TIMEOUT"]?overflow,1)
 same => n,GotoIf($["${QUEUESTATUS}"="FULL"]?overflow,1)
 same => n,Hangup()

exten => q-blocked,1,NoOp(Queue blocked ${CALLERID(num)} -> ${QUEUE_NAME})
 same => n,Playback(ss-noservice)
 same => n,Hangup()

exten => overflow,1,NoOp(Overflow from ${CALL_QUEUE})
 same => n,Queue(overflow,tT,,,180)
 same => n,Hangup()

; =====================================================================
; After queue (post-call wrap-up notification)
; =====================================================================
[after-queue]
exten => _.,1,Gosub(cc-trace,s,1(AGENT_CONNECTED,after-queue,${EXTEN}))
 same => n,NoOp(After queue, agent ${MEMBERINTERFACE} queue=${QUEUE_NAME} status=${QUEUESTATUS})
 same => n,Return()

; =====================================================================
; Internal agent context: features, supervisor, conf rooms
; =====================================================================
[agents-internal]
; Login/logout to queues
exten => *11,1,Answer()
 same => n,AddQueueMember(${ARG1:-support},Local/${CALLERID(num)}@agents-internal/n,0,,${CALLERID(num)})
 same => n,Playback(agent-loginok)
 same => n,Hangup()

exten => *12,1,Answer()
 same => n,RemoveQueueMember(${ARG1:-support},Local/${CALLERID(num)}@agents-internal/n)
 same => n,Playback(agent-loggedoff)
 same => n,Hangup()

; Pause / Unpause
exten => *13,1,Answer()
 same => n,PauseQueueMember(,Local/${CALLERID(num)}@agents-internal/n,${ARG1:-break})
 same => n,Playback(beep)
 same => n,Hangup()

exten => *14,1,Answer()
 same => n,UnpauseQueueMember(,Local/${CALLERID(num)}@agents-internal/n)
 same => n,Playback(beep)
 same => n,Hangup()

; Supervisor: ChanSpy on a SIP/agent number
exten => *33,1,Answer()
 same => n,GotoIf($["${DB(supervisor/${CALLERID(num)})}"!="1"]?denied)
 same => n,UserEvent(SupervisorSpy,Actor:${CALLERID(num)},Target:${ARG1})
 same => n,ChanSpy(PJSIP/${ARG1},qBE)
 same => n,Hangup()
 same => n(denied),Playback(vm-incorrect)
 same => n,Hangup()

; Supervisor whisper
exten => *34,1,Answer()
 same => n,GotoIf($["${DB(supervisor/${CALLERID(num)})}"!="1"]?denied)
 same => n,UserEvent(SupervisorWhisper,Actor:${CALLERID(num)},Target:${ARG1})
 same => n,ChanSpy(PJSIP/${ARG1},qBwE)
 same => n,Hangup()
 same => n(denied),Playback(vm-incorrect)
 same => n,Hangup()

; Conference room
exten => *80,1,Answer()
 same => n,ConfBridge(${ARG1:-100},supervisor_bridge,user_default)
 same => n,Hangup()

; Internal agent-to-agent dial
exten => _10XX,1,Dial(PJSIP/${EXTEN},20,tT)
 same => n,Hangup()

#include "vdn_generated.conf"
#include "extensions_cc_override.conf"
