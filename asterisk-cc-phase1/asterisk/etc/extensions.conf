[globals]
RECORDINGS_DIR=/var/spool/asterisk/recordings
POST_REC_SCRIPT=/opt/cc/scripts/mixmonitor_post.sh

[general]
static=yes
writeprotect=no
clearglobalvars=no

; =====================================================================
; Inbound from provider -> IVR
; =====================================================================
[from-provider]
exten => _X.,1,NoOp(Inbound from ${CALLERID(num)} to ${EXTEN})
 same => n,Set(__BUSINESS_CALL=1)
 same => n,Set(__INBOUND_DID=${EXTEN})
 same => n,Set(CDR(userfield)=did=${EXTEN};src=${CALLERID(num)})
 same => n,Goto(ivr-main,s,1)

; =====================================================================
; Main IVR (with AGI lookup to Postgres)
; =====================================================================
[ivr-main]
exten => s,1,NoOp(IVR main)
 same => n,Answer()
 same => n,Wait(0.3)
 same => n,Set(IVR_RETRIES=0)
 same => n,AGI(agi://127.0.0.1:4573/lookup_subscriber.agi,${CALLERID(num)})
 same => n,Set(CDR(userfield)=${CDR(userfield)};segment=${SUB_SEGMENT};lang=${SUB_LANG})
 same => n(menu),Background(custom/ivr-welcome-${SUB_LANG})
 same => n,WaitExten(5)
 same => n,Goto(timeout,1)

exten => 1,1,Goto(queue-enter,support,1)
exten => 2,1,Goto(queue-enter,sales,1)
exten => 3,1,Goto(queue-enter,billing,1)
exten => 9,1,Goto(queue-enter,vip,1)

exten => i,1,Playback(invalid)
 same => n,Set(IVR_RETRIES=$[${IVR_RETRIES}+1])
 same => n,GotoIf($[${IVR_RETRIES} > 2]?ivr-main,timeout,1:ivr-main,s,menu)

exten => t,1,Goto(timeout,1)

exten => timeout,1,Playback(vm-goodbye)
 same => n,Hangup()

; =====================================================================
; Queue enter macro: turn on MixMonitor + bind metadata
; =====================================================================
[queue-enter]
exten => _.,1,NoOp(Enter queue ${EXTEN})
 same => n,Set(QUEUE_NAME=${EXTEN})
 same => n,Set(__CALL_QUEUE=${QUEUE_NAME})
 same => n,Set(__CALL_REC=${UNIQUEID}_${QUEUE_NAME}_${CALLERID(num)})
 same => n,Set(__CALL_REC_DIR=${RECORDINGS_DIR}/${STRFTIME(${EPOCH},,%Y/%m/%d)})
 same => n,System(/bin/mkdir -p ${CALL_REC_DIR})
 same => n,MixMonitor(${CALL_REC_DIR}/${CALL_REC}.wav,b(${POST_REC_SCRIPT}^${UNIQUEID}^${LINKEDID}^${QUEUE_NAME}^${CALL_REC_DIR}/${CALL_REC}.wav^${CALLERID(num)}^${EXTEN}))
 same => n,Queue(${QUEUE_NAME},tT,,,300)
 same => n,GotoIf($["${QUEUESTATUS}"="TIMEOUT"]?overflow,1)
 same => n,GotoIf($["${QUEUESTATUS}"="FULL"]?overflow,1)
 same => n,Hangup()

exten => overflow,1,NoOp(Overflow from ${CALL_QUEUE})
 same => n,Queue(overflow,tT,,,180)
 same => n,Playback(vm-goodbye)
 same => n,Hangup()

; =====================================================================
; After queue (post-call wrap-up notification)
; =====================================================================
[after-queue]
exten => _.,1,NoOp(After queue, agent ${MEMBERINTERFACE})
 same => n,Hangup()

; =====================================================================
; Internal agent context: features, supervisor, conf rooms
; =====================================================================
[agents-internal]
; Login/logout to queues
exten => *11,1,Answer()
 same => n,AddQueueMember(${ARG1:-support},Local/${CALLERID(num)}@agents-internal/n,0,,${CALLERID(num)})
 same => n,Playback(agent-loginok)
 same => n,Hangup()

exten => *12,1,Answer()
 same => n,RemoveQueueMember(${ARG1:-support},Local/${CALLERID(num)}@agents-internal/n)
 same => n,Playback(agent-loggedoff)
 same => n,Hangup()

; Pause / Unpause
exten => *13,1,Answer()
 same => n,PauseQueueMember(,Local/${CALLERID(num)}@agents-internal/n,${ARG1:-break})
 same => n,Playback(beep)
 same => n,Hangup()

exten => *14,1,Answer()
 same => n,UnpauseQueueMember(,Local/${CALLERID(num)}@agents-internal/n)
 same => n,Playback(beep)
 same => n,Hangup()

; Supervisor: ChanSpy on a SIP/agent number
exten => *33,1,Answer()
 same => n,GotoIf($["${DB(supervisor/${CALLERID(num)})}"!="1"]?denied)
 same => n,UserEvent(SupervisorSpy,Actor:${CALLERID(num)},Target:${ARG1})
 same => n,ChanSpy(PJSIP/${ARG1},qBE)
 same => n,Hangup()
 same => n(denied),Playback(vm-incorrect)
 same => n,Hangup()

; Supervisor whisper
exten => *34,1,Answer()
 same => n,GotoIf($["${DB(supervisor/${CALLERID(num)})}"!="1"]?denied)
 same => n,UserEvent(SupervisorWhisper,Actor:${CALLERID(num)},Target:${ARG1})
 same => n,ChanSpy(PJSIP/${ARG1},qBwE)
 same => n,Hangup()
 same => n(denied),Playback(vm-incorrect)
 same => n,Hangup()

; Conference room
exten => *80,1,Answer()
 same => n,ConfBridge(${ARG1:-100},supervisor_bridge,user_default)
 same => n,Hangup()

; Internal agent-to-agent dial
exten => _10XX,1,Dial(PJSIP/${EXTEN},20,tT)
 same => n,Hangup()
