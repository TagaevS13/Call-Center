; ==== Global ====
[global]
type=global
user_agent=Asterisk-CC
endpoint_identifier_order=auth_username,username,ip,anonymous

; ==== Transports ====
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

[transport-tls]
type=transport
protocol=tls
bind=0.0.0.0:5061
cert_file=/etc/asterisk/keys/asterisk.pem
priv_key_file=/etc/asterisk/keys/asterisk.key
method=tlsv1_2

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089
local_net=10.0.0.0/8
local_net=172.16.0.0/12
local_net=127.0.0.0/8
external_media_address=${PUBLIC_DOMAIN}
external_signaling_address=${PUBLIC_DOMAIN}

[transport-ws]
type=transport
protocol=ws
bind=0.0.0.0:8088
local_net=10.0.0.0/8
local_net=172.16.0.0/12
local_net=127.0.0.0/8
external_media_address=${PUBLIC_DOMAIN}
external_signaling_address=${PUBLIC_DOMAIN}

; ==== Agent endpoint template (WebRTC + WSS) ====
[agent-tpl](!)
type=endpoint
context=agents-internal
; ws:8088 для UI по HTTP (без сертификата); wss:8089 — если UI по HTTPS
transport=transport-wss,transport-ws
from_domain=${PUBLIC_DOMAIN}
disallow=all
; Только G.711 — стабильнее с GSM; opus давал one-way на части клиентов
allow=alaw,ulaw
direct_media=no
force_rport=yes
rewrite_contact=yes
media_address=${PUBLIC_DOMAIN}
bind_rtp_to_media_address=no
rtp_symmetric=yes
; секунды; должно быть < rtcpinterval в rtp.conf (мс) / 1000
rtp_keepalive=15
timers_min_se=90
trust_id_inbound=yes
; Переключаемый WebRTC-профиль (dtls/ice/rtcp_mux/bundle/webrtc): генерируется
; docker-entrypoint.sh по AGENT_WEBRTC_MODE (manual|standard). A/B на живом —
; см. ops/audio-two-way-runbook.md (плечо Asterisk -> браузер).
#include "pjsip_agent_webrtc.conf"

[agent-aor-tpl](!)
type=aor
max_contacts=2
remove_existing=yes
qualify_frequency=30

[agent-auth-tpl](!)
type=auth
auth_type=userpass

#include "pjsip_provider.conf"
#include "pjsip_agents.conf"
