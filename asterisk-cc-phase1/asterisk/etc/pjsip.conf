; ==== Global ====
[global]
type=global
user_agent=Asterisk-CC
endpoint_identifier_order=auth_username,username,ip,anonymous

; ==== Transports ====
[transport-udp]
type=transport
protocol=udp
; GSM SoftX — только сигнальный NIC (медиа UMG на 10.212.154.35/enp13s4f1 через provider media_address)
bind=172.16.4.19:5060

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

[transport-tls]
type=transport
protocol=tls
bind=0.0.0.0:5061
cert_file=/etc/asterisk/keys/asterisk.pem
priv_key_file=/etc/asterisk/keys/asterisk.key
method=tlsv1_2

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089
local_net=10.0.0.0/8
local_net=172.16.0.0/12
local_net=127.0.0.0/8
external_media_address=172.16.6.183
external_signaling_address=172.16.6.183

[transport-ws]
type=transport
protocol=ws
bind=0.0.0.0:8088
local_net=10.0.0.0/8
local_net=172.16.0.0/12
local_net=127.0.0.0/8
external_media_address=172.16.6.183
external_signaling_address=172.16.6.183

; ==== Agent endpoint template (WebRTC + WSS) ====
[agent-tpl](!)
type=endpoint
context=agents-internal
; Opus для WebRTC + G.711 для моста с GSM в очереди (res_srtp обязателен)
transport=transport-wss
from_domain=172.16.6.183
disallow=all
allow=alaw
direct_media=no
force_rport=yes
rewrite_contact=yes
media_address=172.16.6.183
bind_rtp_to_media_address=no
rtp_symmetric=yes
; секунды; должно быть < rtcpinterval в rtp.conf (мс) / 1000
rtp_keepalive=15
timers_min_se=90
trust_id_inbound=yes
; Переключаемый WebRTC-профиль (dtls/ice/rtcp_mux/bundle/webrtc): генерируется
; asterisk-prestart.sh по AGENT_WEBRTC_MODE (manual|standard). A/B на живом —
; см. ops/audio-two-way-runbook.md (плечо Asterisk -> браузер).
#include "pjsip_agent_webrtc.conf"

[agent-aor-tpl](!)
type=aor
max_contacts=2
remove_existing=yes
qualify_frequency=30

[agent-auth-tpl](!)
type=auth
auth_type=userpass

#include "pjsip_provider.conf"
#include "pjsip_agents.conf"

; ===== TEMP DIAGNOSTIC ENDPOINT 9999 (plain SIP/TCP, no WebRTC/DTLS) =====
; Added for one-off diagnostic test comparing plain-SIP audio vs WebRTC leg.
; Safe to delete after test.
[9999]
type=endpoint
context=agents-internal
transport=transport-tcp
disallow=all
allow=alaw
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes
auth=9999-auth
aors=9999

[9999]
type=aor
max_contacts=2
remove_existing=yes

[9999-auth]
type=auth
username=9999
password=testdiag9999
