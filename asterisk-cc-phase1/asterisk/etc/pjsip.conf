; ==== Transports ====
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

[transport-tls]
type=transport
protocol=tls
bind=0.0.0.0:5061
cert_file=/etc/asterisk/keys/asterisk.pem
priv_key_file=/etc/asterisk/keys/asterisk.key
method=tlsv1_2

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089

; ==== Provider trunk (template) ====
[provider-auth]
type=auth
auth_type=userpass
username=${SIP_PROVIDER_USER}
password=${SIP_PROVIDER_PASSWORD}

[provider-aor]
type=aor
contact=sip:${SIP_PROVIDER_HOST}

[provider]
type=endpoint
context=from-provider
disallow=all
allow=opus,g722,alaw,ulaw
outbound_auth=provider-auth
aors=provider-aor
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[provider-identify]
type=identify
endpoint=provider
match=${SIP_PROVIDER_HOST}

[provider-reg]
type=registration
outbound_auth=provider-auth
server_uri=sip:${SIP_PROVIDER_HOST}
client_uri=sip:${SIP_PROVIDER_USER}@${SIP_PROVIDER_HOST}
retry_interval=60

; ==== Agent endpoint template (WebRTC + TLS) ====
[agent-tpl](!)
type=endpoint
context=agents-internal
disallow=all
allow=opus,g722,alaw
direct_media=no
force_rport=yes
rewrite_contact=yes
use_avpf=yes
media_encryption=dtls
dtls_verify=fingerprint
dtls_setup=actpass
dtls_cert_file=/etc/asterisk/keys/asterisk.pem
dtls_private_key=/etc/asterisk/keys/asterisk.key
ice_support=yes
media_use_received_transport=yes
rtcp_mux=yes
webrtc=yes
trust_id_inbound=yes

[agent-aor-tpl](!)
type=aor
max_contacts=2
remove_existing=yes
qualify_frequency=30

[agent-auth-tpl](!)
type=auth
auth_type=userpass

; ==== 50 agent endpoints (1001..1050) — для приёмки ====
; В prod создаются скриптом из таблицы agents (см. asterisk/scripts/regen_pjsip_agents.py)

[1001](agent-tpl)
auth=1001-auth
aors=1001-aor
callerid=Agent 1001 <1001>

[1001-aor](agent-aor-tpl)

[1001-auth](agent-auth-tpl)
username=1001
password=changeme1001

; ... аналогично 1002..1050. См. asterisk/scripts/regen_pjsip_agents.py
