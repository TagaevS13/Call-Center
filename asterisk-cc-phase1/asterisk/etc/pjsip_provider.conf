; Trusted GSM/SBC — identify по ПОДСЕТЯМ (не /32):
;   сигналинг ${SIP_PROVIDER_SIGNAL_NET} → SIP на 172.16.4.19 (enp13s4f0)
;   медиа     ${SIP_PROVIDER_MEDIA_NET} → RTP на 172.16.6.183 (enp6s0f0, PUBLIC_DOMAIN)
; WebRTC-агенты: 172.16.6.183 (agent-tpl)

[provider]
type=endpoint
context=from-provider
transport=transport-udp
disallow=all
allow=alaw,ulaw
direct_media=no
media_address=${GSM_MEDIA_ADDRESS}
bind_rtp_to_media_address=yes
rtp_symmetric=yes
rtp_keepalive=15
force_rport=yes
rewrite_contact=yes
identify_by=ip
ice_support=no
media_use_received_transport=no

[provider-identify]
type=identify
endpoint=provider
match=${SIP_PROVIDER_SIGNAL_NET}
match=${SIP_PROVIDER_MEDIA_NET}
