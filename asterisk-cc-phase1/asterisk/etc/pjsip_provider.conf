; Trusted GSM/SBC (SoftX + UMG) — identify по ПОДСЕТЯМ (не /32):
;   сигналинг ${SIP_PROVIDER_SIGNAL_NET}  (хост SoftX: ${SIP_PROVIDER_SIGNAL}, напр. 10.1.5.10)
;   медиа     ${SIP_PROVIDER_MEDIA_NET}   (хост UMG:    ${SIP_PROVIDER_MEDIA}, напр. 10.1.5.75)
; GSM SIP + RTP на 172.16.4.19 (enp13s4f0) — совпадает с SDP в 200 OK и маршрутом SoftX/UMG
; WebRTC-агенты остаются на 172.16.6.183 (agent-tpl, PUBLIC_DOMAIN)

[provider]
type=endpoint
context=from-provider
disallow=all
allow=alaw,ulaw
direct_media=no
media_address=${GSM_MEDIA_ADDRESS}
bind_rtp_to_media_address=yes
rtp_symmetric=yes
rtp_keepalive=15
force_rport=yes
rewrite_contact=yes
identify_by=ip
ice_support=no
media_use_received_transport=yes

[provider-identify]
type=identify
endpoint=provider
match=${SIP_PROVIDER_SIGNAL_NET}
match=${SIP_PROVIDER_MEDIA_NET}
