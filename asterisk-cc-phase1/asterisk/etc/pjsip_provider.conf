; Trusted GSM/SBC — identify по ПОДСЕТЯМ (не /32):
;   сигналинг 10.1.5.8/29 → SIP на 172.16.4.19 (enp13s4f0)
;   медиа     10.1.5.64/27 → RTP на 10.212.154.35 (enp13s4f1); входящий/исходящий RTP с любого хоста в /27 (SDP: .72, .75, …)
; WebRTC-агенты: 172.16.6.183 (agent-tpl)

[provider]
type=endpoint
context=from-provider
transport=transport-udp
disallow=all
allow=alaw,ulaw
direct_media=no
media_address=10.212.154.35
bind_rtp_to_media_address=yes
rtp_symmetric=yes
rtp_keepalive=15
force_rport=yes
rewrite_contact=yes
identify_by=ip
ice_support=no
media_use_received_transport=no

[provider-identify]
type=identify
endpoint=provider
match=10.1.5.8/29
match=10.1.5.64/27
