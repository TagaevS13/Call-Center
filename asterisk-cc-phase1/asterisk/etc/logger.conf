[general]
dateformat=%F %T.%3q
queue_log=yes
queue_log_to_file=yes
queue_log_name=queue_log
appendhostname=no
rotatestrategy=sequential
archive=yes
rotate=50
maxfiles=30
exec_after_rotate=gzip -q9 ${filename}.${rotatecount}; /opt/cc/scripts/queue_log_rotate_hook.sh ${filename}; /opt/cc/scripts/asterisk_log_maintenance.sh /var/log/asterisk

[logfiles]
console => notice,warning,error,verbose

; SIP PJSIP + dialplan + ошибки (основной полный лог)
full => notice,warning,error,verbose,debug,dtmf,fax

; Структурированный трейс звонков — grep CC-TRACE
cc_calls => notice,warning,error,verbose

; RTP пакеты (включается entrypoint при CC_RTP_DEBUG=1)
rtp_trace => debug

; PJSIP SIP-трейс (дублирует full при pjsip set logger on)
pjsip_trace => debug,notice,warning,error,verbose
