global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Asterisk metrics (robinmarechal exporter started inside asterisk-a container, host network)
  - job_name: asterisk
    static_configs:
      - targets: ["host.docker.internal:9815"]
        labels: {tier: voice, node: asterisk-a}

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels: {tier: db}

  - job_name: node
    static_configs:
      - targets: ["host.docker.internal:9100"]
        labels: {tier: os, node: project}
