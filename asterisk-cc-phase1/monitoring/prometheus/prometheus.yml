global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9091"]

  - job_name: asterisk
    static_configs:
      - targets: ["127.0.0.1:9815"]
        labels: {tier: voice, node: asterisk-a}

  - job_name: postgres
    static_configs:
      - targets: ["127.0.0.1:9187"]
        labels: {tier: db}

  - job_name: node
    static_configs:
      - targets: ["127.0.0.1:9100"]
        labels: {tier: os, node: project}
