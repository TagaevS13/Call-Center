global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: asterisk
    static_configs:
      - targets: ['ast-a:9815', 'ast-b:9815']
        labels: {tier: voice}

  - job_name: postgres
    static_configs:
      - targets: ['db-1:9187']
        labels: {tier: db}

  - job_name: node
    static_configs:
      - targets: ['ast-a:9100', 'ast-b:9100', 'db-1:9100', 'mon-1:9100']
        labels: {tier: os}
