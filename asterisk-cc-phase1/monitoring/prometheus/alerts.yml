groups:
  - name: voice
    rules:
      - alert: AsteriskExporterDown
        expr: up{job="asterisk"} == 0
        for: 2m
        labels: {severity: critical}
        annotations:
          summary: "Asterisk exporter unreachable on {{ $labels.instance }}"

      - alert: HighConcurrentCalls
        expr: sum(asterisk_core_active_channels) > 180
        for: 5m
        labels: {severity: warning}
        annotations:
          summary: "Concurrent channels > 180"

  - name: infrastructure
    rules:
      - alert: NodeExporterDown
        expr: up{job="node"} == 0
        for: 2m
        labels: {severity: warning}
        annotations:
          summary: "node_exporter down"

      - alert: PostgresExporterDown
        expr: up{job="postgres"} == 0
        for: 2m
        labels: {severity: critical}
        annotations:
          summary: "postgres_exporter down"

      - alert: HostDiskLow
        expr: |
          (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay",mountpoint="/"}
           / node_filesystem_size_bytes{fstype!~"tmpfs|overlay",mountpoint="/"}) < 0.10
        for: 10m
        labels: {severity: warning}
        annotations:
          summary: "Root filesystem <10% free on {{ $labels.instance }}"
