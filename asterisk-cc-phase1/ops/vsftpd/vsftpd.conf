# vsftpd for project (172.16.6.183) — lab/stage, local users only
listen=YES
listen_ipv6=NO

anonymous_enable=NO
local_enable=YES
write_enable=YES
local_umask=022

dirmessage_enable=YES
xferlog_enable=YES
xferlog_file=/var/log/vsftpd.log
connect_from_port_20=YES

# Only users listed in /etc/vsftpd.userlist (see userlist file)
userlist_enable=YES
userlist_file=/etc/vsftpd.userlist
userlist_deny=NO

# Chroot into home FTP folder (writable subdir — see setup script)
chroot_local_user=YES
allow_writeable_chroot=YES
user_sub_token=$USER
local_root=/home/$USER/ftp

# UTC in LIST; FileZilla converts to client TZ once (avoid +5h drift with use_localtime=YES)
use_localtime=NO

# Passive mode (required for FileZilla behind NAT/firewall)
pasv_enable=YES
pasv_min_port=40000
pasv_max_port=40100
pasv_address=172.16.6.183
pasv_addr_resolve=NO

secure_chroot_dir=/var/run/vsftpd/empty
pam_service_name=vsftpd

rsa_cert_file=/etc/ssl/certs/ssl-cert-snakeoil.pem
rsa_private_key_file=/etc/ssl/private/ssl-cert-snakeoil.key
ssl_enable=NO
