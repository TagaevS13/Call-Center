<!doctype html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CC · Вход</title>
  <link rel="stylesheet" href="shared/theme.css" />
  <style>
    body { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .login-card { width: min(420px, 100%); }
    .login-card .brand { margin-bottom: 18px; }
    .hint { font-size: 12px; color: var(--fg-2); margin-top: 12px; line-height: 1.5; }
    .hint code { font-size: 11px; }
    .err { color: var(--err); font-size: 13px; min-height: 18px; margin-top: 6px; }
    .links { margin-top: 14px; font-size: 12px; color: var(--fg-2); }
    .links a { color: var(--acc); }
  </style>
</head>
<body>
  <div class="card login-card" style="padding: 22px">
    <div class="brand"><span class="logo"></span><div>Кол-центр · Вход</div></div>
    <form class="stack" id="login-form" autocomplete="off">
      <label class="field"><span>Логин</span>
        <input id="login" name="cc-login" autocomplete="off" placeholder="agent01" />
      </label>
      <label class="field"><span>Пароль</span>
        <input id="password" name="cc-secret" type="password" autocomplete="new-password"
          data-lpignore="true" data-1p-ignore="true" readonly placeholder="••••••••" />
      </label>
      <div class="err" id="err"></div>
      <div class="row" style="justify-content:flex-end; margin-top: 4px">
        <button class="btn primary" id="btn-login" type="button">Войти</button>
      </div>
    </form>
    <p class="hint">
      Демо: <code>agent01/agent01</code> — сам выбирает очереди;
      <code>agent02/agent02</code> — очереди назначает админ.
    </p>
    <p class="links">
      Сервер: <code>python webui/serve.py 9000</code> →
      <a href="http://localhost:9000/">localhost:9000</a>
    </p>
  </div>
  <script type="module" src="portal.js"></script>
</body>
</html>
