[global]
repo1-path=/var/lib/pgbackrest
repo1-retention-full=4
repo1-retention-diff=30
repo1-retention-archive=30
repo1-cipher-type=aes-256-cbc
repo1-cipher-pass=changeme
log-level-console=info
log-level-file=detail
process-max=4
start-fast=y

# Optional S3 archive of full backups
# repo2-type=s3
# repo2-s3-bucket=cc-pgbackrest
# repo2-s3-region=eu-central-1
# repo2-s3-endpoint=s3.example.com
# repo2-retention-full=12

[cc]
pg1-path=/var/lib/pgsql/16/data
pg1-port=5432
pg1-user=postgres
